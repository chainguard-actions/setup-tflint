name: Test checksums verification
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download tflint and compute checksum
        id: compute
        run: |
          VERSION="v0.50.3"
          URL="https://github.com/terraform-linters/tflint/releases/download/${VERSION}/tflint_linux_amd64.zip"
          curl -fsSL -o /tmp/tflint.zip "$URL"
          CHECKSUM=$(sha256sum /tmp/tflint.zip | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "Computed checksum: $CHECKSUM"
      - id: setup
        uses: .
        with:
          tflint_version: v0.50.3
          checksums: ${{ steps.compute.outputs.checksum }}
      - name: Assert tflint is installed with valid checksum
        run: |
          which tflint
          INSTALLED=$(tflint --version | head -1)
          echo "installed: $INSTALLED"
          if ! echo "$INSTALLED" | grep -q "0.50.3"; then
            echo "FAIL: expected version 0.50.3 but got: $INSTALLED"
            exit 1
          fi
          echo "PASS: tflint installed successfully with checksum verification"
