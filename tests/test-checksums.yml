name: Test checksums verification
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get tflint checksum for v0.50.3 linux_amd64
        id: get-checksum
        run: |
          # Download the checksums file from the tflint release
          CHECKSUM=$(curl -sL https://github.com/terraform-linters/tflint/releases/download/v0.50.3/checksums.txt \
            | grep 'tflint_linux_amd64.zip' | awk '{print $1}')
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "Checksum for tflint v0.50.3 linux_amd64: $CHECKSUM"
      - id: setup
        uses: .
        with:
          tflint_version: v0.50.3
          checksums: ${{ steps.get-checksum.outputs.checksum }}
      - name: Assert tflint is installed with checksum verification
        run: |
          echo "tflint version: $(tflint --version)"
          if ! tflint --version; then
            echo "FAIL: tflint is not installed"
            exit 1
          fi
          echo "PASS: tflint is installed and checksum was verified"
      - name: Assert tflint-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.tflint-version }}
        run: |
          echo "actual tflint-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: tflint-version output is empty"
            exit 1
          fi
          if [[ "$ACTUAL" != *"0.50.3"* ]]; then
            echo "FAIL: expected version to contain '0.50.3', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS: tflint-version output is '$ACTUAL'"
