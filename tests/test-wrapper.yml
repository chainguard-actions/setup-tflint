name: Test wrapper script outputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tflint_version: v0.50.3
          tflint_wrapper: 'true'
      - name: Assert tflint is installed with wrapper
        run: |
          which tflint
          echo "PASS: tflint wrapper is installed"
      - name: Run tflint via wrapper to capture outputs
        id: tflint_run
        run: tflint --version
        continue-on-error: true
      - name: Assert exitcode output is set by wrapper
        env:
          EXITCODE: ${{ steps.tflint_run.outputs.exitcode }}
        run: |
          echo "exitcode: $EXITCODE"
          if [ -z "$EXITCODE" ]; then
            echo "FAIL: exitcode output is empty - wrapper may not be active"
            exit 1
          fi
          if [ "$EXITCODE" != "0" ]; then
            echo "FAIL: expected exitcode 0 but got $EXITCODE"
            exit 1
          fi
          echo "PASS: exitcode output is '$EXITCODE'"
      - name: Assert stdout output is set by wrapper
        env:
          STDOUT: ${{ steps.tflint_run.outputs.stdout }}
        run: |
          echo "stdout: $STDOUT"
          if [ -z "$STDOUT" ]; then
            echo "FAIL: stdout output is empty - wrapper may not be capturing output"
            exit 1
          fi
          echo "PASS: stdout output is captured"
