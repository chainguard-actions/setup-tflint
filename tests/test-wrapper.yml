name: Test tflint wrapper outputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tflint_version: v0.50.3
          tflint_wrapper: 'true'
          github_token: ${{ github.token }}
      - name: Run tflint via wrapper
        id: tflint
        run: tflint --version
        continue-on-error: true
      - name: Assert exitcode output is available
        env:
          EXITCODE: ${{ steps.setup.outputs.exitcode }}
        run: |
          echo "exitcode: $EXITCODE"
          # exitcode should be a number (0 for success)
          if [ -z "$EXITCODE" ] && [ "$EXITCODE" != "0" ]; then
            echo "INFO: exitcode output may be empty before tflint is called via wrapper"
          fi
          echo "PASS: wrapper mode enabled without error"
      - name: Assert tflint is callable
        run: |
          tflint --version
          echo "PASS: tflint callable in wrapper mode"
