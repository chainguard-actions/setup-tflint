name: Test tflint wrapper
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tflint_version: v0.50.3
          tflint_wrapper: 'true'
      - name: Run tflint via wrapper
        id: tflint
        run: tflint --version
        continue-on-error: true
      - name: Assert wrapper outputs are available
        env:
          STDOUT: ${{ steps.setup.outputs.stdout }}
          STDERR: ${{ steps.setup.outputs.stderr }}
          EXITCODE: ${{ steps.setup.outputs.exitcode }}
        run: |
          echo "stdout: $STDOUT"
          echo "stderr: $STDERR"
          echo "exitcode: $EXITCODE"
          # The wrapper should capture output; exitcode should be set
          if [ -z "$EXITCODE" ]; then
            echo "FAIL: exitcode output was empty, wrapper may not be working"
            exit 1
          fi
          echo "PASS: wrapper outputs are available"
