name: Test basic usage (latest tflint)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tflint_version: latest
          github_token: ''
      - name: Assert tflint-version output is set
        env:
          ACTUAL: ${{ steps.setup.outputs.tflint-version }}
        run: |
          echo "actual tflint-version: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: tflint-version output is empty"
            exit 1
          fi
          echo "PASS: tflint-version=$ACTUAL"
      - name: Assert tflint binary is available
        run: |
          which tflint
          tflint --version
          echo "PASS: tflint binary is on PATH"
