name: Test basic usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tflint_version: latest
      - name: Assert tflint is installed
        run: |
          which tflint
          tflint --version
          echo "PASS: tflint is installed and executable"
