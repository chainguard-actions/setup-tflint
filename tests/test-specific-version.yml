name: Test specific version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tflint_version: v0.50.3
      - name: Assert tflint version matches expected
        run: |
          INSTALLED_VERSION=$(tflint --version | head -1 | grep -oP 'v\d+\.\d+\.\d+')
          echo "installed version: $INSTALLED_VERSION"
          if [ "$INSTALLED_VERSION" != "v0.50.3" ]; then
            echo "FAIL: expected v0.50.3 but got $INSTALLED_VERSION"
            exit 1
          fi
          echo "PASS: tflint version is v0.50.3"
