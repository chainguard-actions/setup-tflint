name: Test specific version installation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tflint_version: v0.50.3
      - name: Assert tflint version matches
        run: |
          INSTALLED=$(tflint --version | head -1)
          echo "installed: $INSTALLED"
          if ! echo "$INSTALLED" | grep -q "0.50.3"; then
            echo "FAIL: expected version 0.50.3 but got: $INSTALLED"
            exit 1
          fi
          echo "PASS: correct version installed"
