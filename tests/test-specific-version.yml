name: Test specific tflint version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: .
        with:
          tflint_version: v0.50.3
          github_token: ''
      - name: Assert tflint-version output matches requested version
        env:
          ACTUAL: ${{ steps.setup.outputs.tflint-version }}
        run: |
          echo "actual tflint-version: $ACTUAL"
          if [ "$ACTUAL" != "v0.50.3" ]; then
            echo "FAIL: expected 'v0.50.3' but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS: tflint-version=$ACTUAL"
      - name: Assert tflint binary reports correct version
        run: |
          VERSION=$(tflint --version | head -1 | awk '{print $NF}')
          echo "tflint reported version: $VERSION"
          if [ "$VERSION" != "0.50.3" ]; then
            echo "FAIL: expected tflint version 0.50.3 but got $VERSION"
            exit 1
          fi
          echo "PASS"
